name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: babypakka
          POSTGRES_USER: babypakka
          POSTGRES_PASSWORD: babypakka_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U babypakka"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATASOURCE_URL: jdbc:postgresql://localhost:5432/babypakka
      DATASOURCE_USERNAME: babypakka
      DATASOURCE_PASSWORD: babypakka_dev

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build -x test

      - name: Test
        run: ./gradlew test

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/build/libs/*-all.jar
          retention-days: 7

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  integration:
    name: Integration
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build and start
        run: docker compose up -d --build --wait --wait-timeout 120

      - name: Verify backend
        run: curl -sf http://localhost:8080/health | grep -q UP

      - name: Verify API
        run: curl -sf http://localhost:8080/api/packages | grep -q monthlyPrice

      - name: Verify frontend
        run: curl -sf http://localhost:3000 | grep -qi babypakka

      - name: Logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop
        if: always()
        run: docker compose down -v
