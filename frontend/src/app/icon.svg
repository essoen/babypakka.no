<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Package box body -->
  <rect x="3" y="14" width="26" height="15" rx="2" fill="#6BA4D9"/>
  <!-- Package box lid -->
  <rect x="2" y="10" width="28" height="6" rx="2" fill="#4A7FB5"/>
  <!-- Vertical ribbon -->
  <rect x="14" y="10" width="4" height="19" fill="#F4A7BB"/>
  <!-- Horizontal ribbon -->
  <rect x="2" y="11.5" width="28" height="3" fill="#F4A7BB"/>
  <!-- Bow left loop -->
  <ellipse cx="12" cy="8" rx="4.5" ry="3.5" fill="#F4A7BB" transform="rotate(-15 12 8)"/>
  <!-- Bow right loop -->
  <ellipse cx="20" cy="8" rx="4.5" ry="3.5" fill="#F4A7BB" transform="rotate(15 20 8)"/>
  <!-- Bow center knot -->
  <circle cx="16" cy="9" r="2.5" fill="#E8899F"/>
  <!-- Bow loop inner left -->
  <ellipse cx="12" cy="8" rx="2" ry="1.5" fill="#FAD0DC" transform="rotate(-15 12 8)"/>
  <!-- Bow loop inner right -->
  <ellipse cx="20" cy="8" rx="2" ry="1.5" fill="#FAD0DC" transform="rotate(15 20 8)"/>
</svg>
